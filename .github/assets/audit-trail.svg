<svg xmlns="http://www.w3.org/2000/svg" width="900" height="100" viewBox="0 0 900 100" role="img" aria-label="Audit trail: created, changed, owners changed, deleted — every change is history">
  <rect width="900" height="100" rx="10" fill="#0b1220"/>

  <!-- timeline -->
  <line x1="80" y1="45" x2="820" y2="45" stroke="#334155" stroke-width="2"/>
  <!-- writing head sweeps once per cycle, events appear in its wake -->
  <circle cy="45" r="4" fill="#f8fafc">
    <animate attributeName="cx" values="80;820;820" keyTimes="0;0.72;1" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.9;0;0" keyTimes="0;0.7;0.74;1" dur="10s" repeatCount="indefinite"/>
  </circle>

  <!-- created -->
  <g>
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.11;0.13;0.93;1" dur="10s" repeatCount="indefinite"/>
    <circle cx="200" cy="45" r="7" fill="#14b8a6"/>
    <text x="200" y="76" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="12" fill="#94a3b8">created</text>
  </g>

  <!-- changed -->
  <g>
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.28;0.30;0.93;1" dur="10s" repeatCount="indefinite"/>
    <rect x="393" y="38" width="14" height="14" rx="3" fill="#6366f1"/>
    <text x="400" y="76" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="12" fill="#94a3b8">changed: "Due Date"</text>
  </g>

  <!-- owners changed -->
  <g>
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.46;0.48;0.93;1" dur="10s" repeatCount="indefinite"/>
    <circle cx="594" cy="45" r="7" fill="#f59e0b"/>
    <circle cx="606" cy="45" r="7" fill="#f59e0b" fill-opacity="0.55"/>
    <text x="600" y="76" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="12" fill="#94a3b8">changed: "Owners"</text>
  </g>

  <!-- deleted -->
  <g>
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.64;0.66;0.93;1" dur="10s" repeatCount="indefinite"/>
    <rect x="753" y="38" width="14" height="14" rx="3" fill="#ef4444" transform="rotate(45 760 45)"/>
    <text x="760" y="76" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="12" fill="#94a3b8">deleted · by whom</text>
  </g>

  <text x="80" y="24" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#475569">record_history — every change, resolved at write time</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="900" height="240" viewBox="0 0 900 240" role="img" aria-label="Nine record types orbiting one project">
  <rect width="900" height="240" rx="10" fill="#0b1220"/>

  <!-- orbit rings -->
  <circle cx="450" cy="120" r="88" fill="none" stroke="#1e293b" stroke-dasharray="3 5"/>
  <circle cx="450" cy="120" r="52" fill="none" stroke="#1e293b" stroke-dasharray="3 5"/>

  <!-- core -->
  <circle cx="450" cy="120" r="30" fill="#111c30" stroke="#14b8a6" stroke-width="1.5">
    <animate attributeName="stroke-opacity" values="1;0.4;1" dur="3s" repeatCount="indefinite"/>
  </circle>
  <text x="450" y="125" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#f8fafc">Project</text>

  <!-- outer ring: rotates clockwise; each chip counter-rotates to stay level -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="10" text-anchor="middle">
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0 450 120;360 450 120" dur="26s" repeatCount="indefinite"/>
      <g><animateTransform attributeName="transform" type="rotate" values="360 450 32;0 450 32" dur="26s" repeatCount="indefinite"/>
        <rect x="412" y="21" width="76" height="20" rx="10" fill="#0e2233" stroke="#14b8a6" stroke-opacity="0.5"/>
        <text x="450" y="35" fill="#5eead4">Milestones</text></g>
      <g><animateTransform attributeName="transform" type="rotate" values="360 534 93;0 534 93" dur="26s" repeatCount="indefinite"/>
        <rect x="492" y="82" width="84" height="20" rx="10" fill="#151338" stroke="#6366f1" stroke-opacity="0.5"/>
        <text x="534" y="96" fill="#a5b4fc">Action Items</text></g>
      <g><animateTransform attributeName="transform" type="rotate" values="360 502 191;0 502 191" dur="26s" repeatCount="indefinite"/>
        <rect x="470" y="180" width="64" height="20" rx="10" fill="#2a1a0b" stroke="#f59e0b" stroke-opacity="0.5"/>
        <text x="502" y="194" fill="#fcd34d">Issues</text></g>
      <g><animateTransform attributeName="transform" type="rotate" values="360 398 191;0 398 191" dur="26s" repeatCount="indefinite"/>
        <rect x="350" y="180" width="96" height="20" rx="10" fill="#0e2233" stroke="#14b8a6" stroke-opacity="0.5"/>
        <text x="398" y="194" fill="#5eead4">Status Reports</text></g>
      <g><animateTransform attributeName="transform" type="rotate" values="360 366 93;0 366 93" dur="26s" repeatCount="indefinite"/>
        <rect x="322" y="82" width="88" height="20" rx="10" fill="#151338" stroke="#6366f1" stroke-opacity="0.5"/>
        <text x="366" y="96" fill="#a5b4fc">Attachments</text></g>
    </g>

    <!-- inner ring: counter-clockwise -->
    <g>
      <animateTransform attributeName="transform" type="rotate" values="360 450 120;0 450 120" dur="17s" repeatCount="indefinite"/>
      <g><animateTransform attributeName="transform" type="rotate" values="0 450 68;360 450 68" dur="17s" repeatCount="indefinite"/>
        <rect x="426" y="57" width="48" height="20" rx="10" fill="#111c30" stroke="#475569"/>
        <text x="450" y="71" fill="#94a3b8">Links</text></g>
      <g><animateTransform attributeName="transform" type="rotate" values="0 502 120;360 502 120" dur="17s" repeatCount="indefinite"/>
        <rect x="468" y="109" width="68" height="20" rx="10" fill="#111c30" stroke="#475569"/>
        <text x="502" y="123" fill="#94a3b8">Resources</text></g>
      <g><animateTransform attributeName="transform" type="rotate" values="0 450 172;360 450 172" dur="17s" repeatCount="indefinite"/>
        <rect x="422" y="161" width="56" height="20" rx="10" fill="#111c30" stroke="#475569"/>
        <text x="450" y="175" fill="#94a3b8">Updates</text></g>
      <g><animateTransform attributeName="transform" type="rotate" values="0 398 120;360 398 120" dur="17s" repeatCount="indefinite"/>
        <rect x="370" y="109" width="56" height="20" rx="10" fill="#111c30" stroke="#475569"/>
        <text x="398" y="123" fill="#94a3b8">People</text></g>
    </g>
  </g>

  <text x="450" y="230" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#475569">nine record types · one project · full CRUD + audit on every one</text>
</svg>

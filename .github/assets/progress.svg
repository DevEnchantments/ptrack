<svg xmlns="http://www.w3.org/2000/svg" width="900" height="190" viewBox="0 0 900 190" role="img" aria-label="Roadmap progress bars">
  <defs>
    <linearGradient id="pfill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="pfill2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="900" height="190" rx="10" fill="#0b1220"/>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="13">
    <text x="40" y="42" fill="#e2e8f0">Phase 1 — CRUD · history · deletion audit</text>
    <rect x="40" y="52" width="640" height="10" rx="5" fill="#1e293b"/>
    <rect x="40" y="52" height="10" rx="5" fill="url(#pfill)">
      <animate attributeName="width" values="0;640" dur="1.6s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
    </rect>
    <text x="700" y="61" fill="#14b8a6" font-weight="700">100%
      <animate attributeName="opacity" values="0;0;1" dur="1.8s" fill="freeze"/>
    </text>

    <text x="40" y="90" fill="#e2e8f0">Quality baseline — CI · tests · API docs</text>
    <rect x="40" y="100" width="640" height="10" rx="5" fill="#1e293b"/>
    <rect x="40" y="100" height="10" rx="5" fill="url(#pfill2)">
      <animate attributeName="width" values="0;640" begin="0.4s" dur="1.6s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
    </rect>
    <text x="700" y="109" fill="#818cf8" font-weight="700">100%
      <animate attributeName="opacity" values="0;0;1" dur="2.2s" fill="freeze"/>
    </text>

    <text x="40" y="138" fill="#e2e8f0">Dashboards · Gantt · heatmap</text>
    <rect x="40" y="148" width="640" height="10" rx="5" fill="#1e293b"/>
    <text x="700" y="157" fill="#f59e0b" font-weight="700">next up
      <animate attributeName="opacity" values="1;0.35;1" dur="2s" repeatCount="indefinite"/>
    </text>

    <text x="40" y="180" fill="#475569" font-size="11">flex columns · search · email — queued behind the dashboards decision</text>
  </g>

  <!-- shimmer sweeping the finished bars forever -->
  <rect x="40" y="52" width="120" height="10" rx="5" fill="url(#shine)">
    <animate attributeName="x" values="40;560;40" dur="5s" repeatCount="indefinite"/>
  </rect>
  <rect x="40" y="100" width="120" height="10" rx="5" fill="url(#shine)">
    <animate attributeName="x" values="40;560;40" begin="1s" dur="5s" repeatCount="indefinite"/>
  </rect>
</svg>

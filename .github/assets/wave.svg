<svg xmlns="http://www.w3.org/2000/svg" width="900" height="100" viewBox="0 0 900 100" role="img" aria-label="Animated wave footer">
  <defs>
    <linearGradient id="wg1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#14b8a6">
        <animate attributeName="stop-color" values="#14b8a6;#6366f1;#14b8a6" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#6366f1">
        <animate attributeName="stop-color" values="#6366f1;#f59e0b;#6366f1" dur="10s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <rect width="900" height="100" fill="#0b1220"/>

  <!-- back wave: slower, dimmer -->
  <path d="M0 62 Q112.5 32 225 62 T450 62 T675 62 T900 62 T1125 62 T1350 62 T1575 62 T1800 62 V100 H0 Z"
        fill="url(#wg1)" opacity="0.25">
    <animateTransform attributeName="transform" type="translate" values="0 0;-900 0" dur="13s" repeatCount="indefinite"/>
  </path>

  <!-- front wave -->
  <path d="M0 72 Q112.5 46 225 72 T450 72 T675 72 T900 72 T1125 72 T1350 72 T1575 72 T1800 72 V100 H0 Z"
        fill="url(#wg1)" opacity="0.5">
    <animateTransform attributeName="transform" type="translate" values="-900 0;0 0" dur="8s" repeatCount="indefinite"/>
  </path>
</svg>

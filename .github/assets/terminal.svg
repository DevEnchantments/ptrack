<svg xmlns="http://www.w3.org/2000/svg" width="900" height="190" viewBox="0 0 900 190" role="img" aria-label="Terminal: npm run dev boots the NestJS API">
  <defs>
    <clipPath id="cmdclip"><rect x="130" y="46" height="20" width="0">
      <animate attributeName="width" calcMode="discrete"
        values="0;11;22;33;44;55;66;77;88;99;110;121;121;0"
        keyTimes="0;0.02;0.04;0.06;0.08;0.10;0.12;0.14;0.16;0.18;0.20;0.22;0.97;1"
        dur="12s" repeatCount="indefinite"/>
    </rect></clipPath>
  </defs>

  <rect width="900" height="190" rx="12" fill="#0b1220" stroke="#1e293b"/>
  <!-- window chrome -->
  <rect width="900" height="30" rx="12" fill="#111c30"/>
  <rect y="18" width="900" height="12" fill="#111c30"/>
  <circle cx="22" cy="15" r="5" fill="#ef4444"/>
  <circle cx="40" cy="15" r="5" fill="#f59e0b"/>
  <circle cx="58" cy="15" r="5" fill="#22c55e"/>
  <text x="450" y="19" text-anchor="middle" font-family="Consolas, Menlo, monospace" font-size="11" fill="#475569">backend — npm</text>

  <g font-family="Consolas, Menlo, monospace" font-size="14">
    <text x="24" y="61" fill="#22c55e">ptrack/backend&#160;$</text>
    <text x="182" y="61" fill="#e2e8f0" clip-path="url(#cmdclip)">npm run dev</text>

    <text x="24" y="88" fill="#64748b">[Nest] Starting Nest application...
      <animate attributeName="opacity" calcMode="discrete" values="0;1;1;0" keyTimes="0;0.3;0.97;1" dur="12s" repeatCount="indefinite"/>
    </text>
    <text x="24" y="112" fill="#64748b">[Nest] Mapped {/projects, GET} · 54 routes · guard: local JWT
      <animate attributeName="opacity" calcMode="discrete" values="0;1;1;0" keyTimes="0;0.42;0.97;1" dur="12s" repeatCount="indefinite"/>
    </text>
    <text x="24" y="136" fill="#94a3b8">[Nest] Nest application successfully started
      <animate attributeName="opacity" calcMode="discrete" values="0;1;1;0" keyTimes="0;0.54;0.97;1" dur="12s" repeatCount="indefinite"/>
    </text>
    <text x="24" y="165" fill="#22c55e" font-weight="700">➜ API ready on http://localhost:3000 · docs at /api/docs
      <animate attributeName="opacity" calcMode="discrete" values="0;1;1;0" keyTimes="0;0.66;0.97;1" dur="12s" repeatCount="indefinite"/>
    </text>
  </g>

  <rect x="184" y="48" width="9" height="17" fill="#e2e8f0">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="x" calcMode="discrete"
      values="184;195;206;217;228;239;250;261;272;283;294;305;305;184"
      keyTimes="0;0.02;0.04;0.06;0.08;0.10;0.12;0.14;0.16;0.18;0.20;0.22;0.97;1"
      dur="12s" repeatCount="indefinite"/>
  </rect>
</svg>
